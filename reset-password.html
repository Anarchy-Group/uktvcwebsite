<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password — UK Television Clips</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* ====================================== */
/* RESET */
/* ====================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    font-family:'Inter',sans-serif;
    background:#070b14;
    color:white;
    position:relative;
}

/* ====================================== */
/* BACKGROUND */
/* ====================================== */

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 20%, rgba(37,99,235,0.18), transparent 30%),
        radial-gradient(circle at 80% 70%, rgba(255,0,85,0.12), transparent 30%);
    animation:bgMove 14s ease-in-out infinite alternate;
    z-index:-4;
}

@keyframes bgMove{

    from{
        transform:scale(1) translateY(0px);
    }

    to{
        transform:scale(1.1) translateY(-30px);
    }

}

.noise{
    position:fixed;
    inset:0;
    opacity:0.035;
    pointer-events:none;
    z-index:-3;
    background-image:url("https://grainy-gradients.vercel.app/noise.svg");
}

.bg-glow{
    position:fixed;
    width:700px;
    height:700px;
    background:#0047ff25;
    filter:blur(120px);
    top:-200px;
    right:-150px;
    z-index:-2;
}

.bg-glow2{
    position:fixed;
    width:600px;
    height:600px;
    background:#ff004425;
    filter:blur(120px);
    bottom:-200px;
    left:-150px;
    z-index:-2;
}

/* ====================================== */
/* CARD */
/* ====================================== */

.reset-card{
    width:92%;
    max-width:520px;
    background:rgba(17,24,39,0.82);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border-radius:34px;
    padding:42px;
    position:relative;
    overflow:hidden;
    animation:fadeUp 1s ease;
    box-shadow:0 30px 90px rgba(0,0,0,0.45);
}

.reset-card::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        135deg,
        rgba(255,255,255,0.04),
        transparent
    );
    pointer-events:none;
}

/* ====================================== */
/* TYPOGRAPHY */
/* ====================================== */

.tag{
    display:inline-block;
    padding:10px 16px;
    border-radius:999px;
    background:rgba(96,165,250,0.12);
    border:1px solid rgba(96,165,250,0.18);
    color:#93c5fd;
    margin-bottom:24px;
    font-size:0.9rem;
}

h1{
    font-family:'Space Grotesk',sans-serif;
    font-size:3rem;
    line-height:1;
    margin-bottom:20px;
}

h1 span{
    background:linear-gradient(90deg,#60a5fa,#2563eb);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.description{
    color:#b9c0d3;
    line-height:1.8;
    margin-bottom:32px;
}

/* ====================================== */
/* INPUT */
/* ====================================== */

.input-wrapper{
    position:relative;
}

input{
    width:100%;
    padding:18px 20px;
    padding-right:60px;
    border:none;
    border-radius:18px;
    background:#1f2937;
    color:white;
    font-size:1rem;
    outline:none;
    border:1px solid rgba(255,255,255,0.08);
    transition:0.3s;
}

input:focus{
    border-color:#3b82f6;
    box-shadow:0 0 0 4px rgba(59,130,246,0.15);
}

.toggle-password{
    position:absolute;
    top:50%;
    right:18px;
    transform:translateY(-50%);
    background:none;
    border:none;
    color:#9ca3af;
    cursor:pointer;
    font-size:1rem;
}

/* ====================================== */
/* STRENGTH */
/* ====================================== */

.strength-container{
    margin-top:22px;
}

.strength-bar{
    width:100%;
    height:12px;
    border-radius:999px;
    background:rgba(255,255,255,0.06);
    overflow:hidden;
}

.strength-fill{
    width:0%;
    height:100%;
    border-radius:999px;
    transition:0.4s;
}

.strength-text{
    margin-top:12px;
    color:#b9c0d3;
    font-size:0.92rem;
}

/* ====================================== */
/* REQUIREMENTS */
/* ====================================== */

.requirements{
    margin-top:26px;
    display:grid;
    gap:12px;
}

.requirement{
    display:flex;
    align-items:center;
    gap:12px;
    color:#9ca3af;
    font-size:0.94rem;
    transition:0.3s;
}

.requirement.valid{
    color:#4ade80;
}

/* ====================================== */
/* BUTTON */
/* ====================================== */

button.update-btn{
    width:100%;
    margin-top:34px;
    padding:18px;
    border:none;
    border-radius:18px;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:white;
    font-weight:700;
    font-size:1rem;
    cursor:pointer;
    transition:0.3s;
    position:relative;
    overflow:hidden;
}

button.update-btn::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.3),
        transparent
    );

    transform:translateX(-100%);
    transition:0.8s;
}

button.update-btn:hover::before{
    transform:translateX(100%);
}

button.update-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 20px 40px rgba(37,99,235,0.35);
}

/* ====================================== */
/* SUCCESS */
/* ====================================== */

.success-message{
    margin-top:24px;
    text-align:center;
    color:#4ade80;
    display:none;
}

/* ====================================== */
/* ANIMATIONS */
/* ====================================== */

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0px);
    }

}

/* ====================================== */
/* MOBILE */
/* ====================================== */

@media(max-width:600px){

    .reset-card{
        padding:32px 24px;
    }

    h1{
        font-size:2.3rem;
    }

}

</style>

</head>

<body>

<div class="noise"></div>
<div class="bg-glow"></div>
<div class="bg-glow2"></div>

<div class="reset-card">

    <span class="tag">
        Secure Account Recovery
    </span>

    <h1>
        Create a New
        <span>Password.</span>
    </h1>

    <p class="description">
        Choose a strong password to secure your UK Television Clips account.
        Make sure it’s unique and difficult to guess.
    </p>

    <!-- PASSWORD INPUT -->

    <div class="input-wrapper">

        <input
            type="password"
            id="newPassword"
            placeholder="Enter your new password"
            oninput="checkStrength()">

        <button class="toggle-password" onclick="togglePassword()">
            👁️
        </button>

    </div>

    <!-- STRENGTH -->

    <div class="strength-container">

        <div class="strength-bar">
            <div class="strength-fill" id="strengthFill"></div>
        </div>

        <div class="strength-text" id="strengthText">
            Password strength
        </div>

    </div>

    <!-- REQUIREMENTS -->

    <div class="requirements">

        <div class="requirement" id="lengthReq">
            ✔ At least 8 characters
        </div>

        <div class="requirement" id="upperReq">
            ✔ One uppercase letter
        </div>

        <div class="requirement" id="numberReq">
            ✔ One number
        </div>

        <div class="requirement" id="specialReq">
            ✔ One special character
        </div>

    </div>

    <!-- BUTTON -->

    <button class="update-btn" onclick="updatePassword()">
        Update Password
    </button>

    <div class="success-message" id="successMessage">
        Password updated successfully!
    </div>

</div>

<script>

/* ====================================== */
/* SUPABASE */
/* ====================================== */

const SUPABASE_URL = "https://jihpgbsghatuwwkacsur.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppaHBnYnNnaGF0dXd3a2Fjc3VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMzkxNzcsImV4cCI6MjA5MzcxNTE3N30.qH7iso7t2zoOLi0C68DiUKZecyIDhlxVcJAcNhYLHTk";

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

/* ====================================== */
/* PASSWORD TOGGLE */
/* ====================================== */

function togglePassword(){

    const input =
    document.getElementById("newPassword");

    if(input.type === "password"){

        input.type = "text";

    }else{

        input.type = "password";

    }

}

/* ====================================== */
/* PASSWORD STRENGTH */
/* ====================================== */

function checkStrength(){

    const password =
    document.getElementById("newPassword").value;

    const strengthFill =
    document.getElementById("strengthFill");

    const strengthText =
    document.getElementById("strengthText");

    let strength = 0;

    const hasLength = password.length >= 8;
    const hasUpper = /[A-Z]/.test(password);
    const hasNumber = /[0-9]/.test(password);
    const hasSpecial = /[^A-Za-z0-9]/.test(password);

    updateRequirement("lengthReq", hasLength);
    updateRequirement("upperReq", hasUpper);
    updateRequirement("numberReq", hasNumber);
    updateRequirement("specialReq", hasSpecial);

    if(hasLength) strength++;
    if(hasUpper) strength++;
    if(hasNumber) strength++;
    if(hasSpecial) strength++;

    const widths = [
        "0%",
        "25%",
        "50%",
        "75%",
        "100%"
    ];

    strengthFill.style.width = widths[strength];

    if(strength <= 1){

        strengthFill.style.background = "#ef4444";
        strengthText.innerText = "Weak password";

    }else if(strength === 2){

        strengthFill.style.background = "#f59e0b";
        strengthText.innerText = "Moderate password";

    }else if(strength === 3){

        strengthFill.style.background = "#3b82f6";
        strengthText.innerText = "Strong password";

    }else if(strength === 4){

        strengthFill.style.background = "#22c55e";
        strengthText.innerText = "Very strong password";

    }

}

function updateRequirement(id, valid){

    const element =
    document.getElementById(id);

    if(valid){

        element.classList.add("valid");

    }else{

        element.classList.remove("valid");

    }

}

/* ====================================== */
/* UPDATE PASSWORD */
/* ====================================== */

async function updatePassword(){

    const password =
    document.getElementById("newPassword").value;

    if(password.length < 8){

        alert("Password is too weak.");
        return;

    }

    const { data, error } =
    await supabaseClient.auth.updateUser({

        password: password

    });

    if(error){

        alert(error.message);
        return;

    }

    document.getElementById(
        "successMessage"
    ).style.display = "block";

    setTimeout(() => {

        window.location.href = "/";

    }, 2500);

}

</script>

</body>
</html>
